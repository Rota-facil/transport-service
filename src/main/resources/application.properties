spring.application.name=transport-service
server.port=8085
server.servlet.context-path=/transports

# DATABASE
spring.datasource.url=${DATASOURCE_URL:jdbc:postgresql://localhost:5435/transport_database}
spring.datasource.username=${DATASOURCE_USERNAME:rota-facil}
spring.datasource.password=${DATASOURCE_PASSWORD:admin}

# JPA + HIBERNATE
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# FLYWAY
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.log-resolvers=true

# EUREKA
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8081/eureka}
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.client.fetch-registry=true

# RABBIMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:rota-facil}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:admin}


# RABBITMQ TRANSPORT
rabbitmq.transport.exchange=${RABBITMQ_TRANSPORT_EXCHANGE:transport.events}

# routing keys
rabbitmq.trip.created.routing.key=${RABBITMQ_TRIP_CREATED_ROUTING_KEY:trip.created}
rabbitmq.trip.cancelled.routing.key=${RABBITMQ_TRIP_CANCELLED_ROUTING_KEY:trip.cancelled}
rabbitmq.trip.deleted.routing.key=${RABBITMQ_TRIP_DELETED_ROUTING_KEY:trip.deleted}

rabbitmq.route.created.routing.key=${RABBITMQ_ROUTE_CREATED_ROUTING_KEY:route.created}
rabbitmq.route.updated.routing.key=${RABBITMQ_ROUTE_UPDATED_ROUTING_KEY:route.updated}
rabbitmq.route.deleted.routing.key=${RABBITMQ_ROUTE_DELETED_ROUTING_KEY:route.deleted}

rabbitmq.bus.deleted.routing.key=${RABBITMQ_BUS_DELETED_ROUTING_KEY:bus.deleted}


# RABBITMQ AUTH
rabbitmq.auth.exchange=auth.events

# queues
rabbitmq.transport.user.created.queue=${RABBITMQ_TRANSPORT_USER_CREATED_QUEUE:transport.user.created.queue}
rabbitmq.transport.user.updated.queue=${RABBITMQ_TRANSPORT_USER_UPDATED_QUEUE:transport.user.updated.queue}
rabbitmq.transport.user.deleted.queue=${RABBITMQ_TRANSPORT_USER_DELETED_QUEUE:transport.user.deleted.queue}

# routing keys
rabbitmq.user.created.routing.key=${RABBITMQ_USER_CREATED_ROUTING_KEY:user.created}
rabbitmq.user.updated.routing.key=${RABBITMQ_USER_UPDATED_ROUTING_KEY:user.updated}
rabbitmq.user.deleted.routing.key=${RABBITMQ_USER_DELETED_ROUTING_KEY:user.deleted}



# RABBITMQ PLACES
rabbitmq.places.exchange=${RABBITMQ_PLACES_EXCHANGE:places.exchange}

# queues
rabbitmq.transport.institution.created.queue=${RABBITMQ_TRANSPORT_INSTITUTION_CREATED_QUEUE:transport.institution.created.queue}
rabbitmq.transport.institution.updated.queue=${RABBITMQ_TRANSPORT_INSTITUTION_UPDATED_QUEUE:transport.institution.updated.queue}
rabbitmq.transport.institution.deleted.queue=${RABBITMQ_TRANSPORT_INSTITUTION_DELETED_QUEUE:transport.institution.deleted.queue}

rabbitmq.transport.board.point.created.queue=${RABBITMQ_TRANSPORT_BOARD_POINT_CREATED_QUEUE:transport.board.point.created.queue}
rabbitmq.transport.board.point.updated.queue=${RABBITMQ_TRANSPORT_BOARD_POINT_UPDATED_QUEUE:transport.board.point.updated.queue}
rabbitmq.transport.board.point.deleted.queue=${RABBITMQ_TRANSPORT_BOARD_POINT_DELETED_QUEUE:transport.board.point.deleted.queue}

# routing keys
rabbitmq.institution.created.routing.key=${RABBITMQ_INSTITUTION_CREATED_ROUTING_KEY:institution.created}
rabbitmq.institution.updated.routing.key=${RABBITMQ_INSTITUTION_UPDATED_ROUTING_KEY:institution.updated}
rabbitmq.institution.deleted.routing.key=${RABBITMQ_INSTITUTION_DELETED_ROUTING_KEY:institution.deleted}

rabbitmq.board.point.created.routing.key=${RABBITMQ_BOARDING_CREATED_ROUTING_KEY:boarding.created}
rabbitmq.board.point.updated.routing.key=${RABBITMQ_BOARDING_UPDATED_ROUTING_KEY:boarding.updated}
rabbitmq.board.point.deleted.routing.key=${RABBITMQ_BOARDING_DELETED_ROUTING_KEY:boarding.deleted}


# TRIP CONFIGURATIONS
init.trip.before.minutes=${INIT_TRIP_BEFORE_MINUTES:5}
init.trip.after.minutes=${INIT_TRIP_AFTER_MINUTES:6}


# OBSERVABILITY
# traces
management.tracing.enabled=true
management.tracing.sampling.probability=1.0

# metrics
management.otlp.metrics.export.enabled=true 

# collector
management.otlp.tracing.endpoint=http://localhost:4318/v1/traces
management.otlp.metrics.export.url=http://localhost:4318/v1/metrics